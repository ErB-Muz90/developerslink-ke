[build]
  command = "pnpm install && pnpm --filter @workspace/devlink-ke run build"
  publish = "artifacts/devlink-ke/dist/public"

[build.environment]
  ENABLE_EXPERIMENTAL_COREPACK = "1"
  NODE_VERSION = "24"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pg-native", "better-sqlite3"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
